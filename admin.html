<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · CV Finanzas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0a;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.loginBox{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:40px;width:100%;max-width:380px;text-align:center}
.loginBox .logo{font-size:28px;font-weight:900;margin-bottom:8px}.loginBox .logo span{color:#f5a623}
.loginBox p{color:#666;font-size:13px;margin-bottom:28px}
.loginBox input{width:100%;padding:12px 16px;background:#1e1e1e;border:1px solid #333;border-radius:8px;color:#fff;font-size:15px;margin-bottom:12px;outline:none}
.loginBox input:focus{border-color:#f5a623}
.loginBox button{width:100%;padding:13px;background:#f5a623;color:#000;font-weight:700;font-size:15px;border:none;border-radius:8px;cursor:pointer}
#loginError{color:#e74c3c;font-size:13px;margin-top:10px;display:none}
#adminPanel{display:none}
.topBar{background:#111;border-bottom:1px solid #222;padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.topBar .logo{font-size:20px;font-weight:900}.topBar .logo span{color:#f5a623}
.topBar .right{display:flex;align-items:center;gap:16px}
.statusDot{display:flex;align-items:center;gap:6px;font-size:13px;color:#4caf50}
.statusDot::before{content:'';width:8px;height:8px;background:#4caf50;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btnLogout{padding:7px 16px;background:transparent;border:1px solid #444;border-radius:6px;color:#aaa;font-size:13px;cursor:pointer}
.btnLogout:hover{border-color:#e74c3c;color:#e74c3c}
.content{padding:28px;max-width:760px;margin:0 auto}
.card{background:#141414;border:1px solid #222;border-radius:12px;padding:28px;margin-bottom:20px}
.card h2{font-size:16px;font-weight:700;margin-bottom:22px}
.formRow{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.formGroup{display:flex;flex-direction:column;gap:6px}
.formGroup label{font-size:11px;font-weight:700;letter-spacing:.08em;color:#888;text-transform:uppercase}
.formGroup input{padding:10px 14px;background:#1e1e1e;border:1px solid #333;border-radius:8px;color:#fff;font-size:14px;outline:none}
.formGroup input:focus{border-color:#f5a623}
.emojiBar{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.emojiBtn{padding:5px 10px;background:#1e1e1e;border:1px solid #333;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:#ccc}
.emojiBtn:hover{border-color:#f5a623;color:#fff}
.previewBtn{margin-left:auto;padding:5px 12px;background:transparent;border:1px solid #444;border-radius:6px;cursor:pointer;font-size:12px;color:#aaa}
.previewBtn.active{border-color:#f5a623;color:#f5a623}
textarea{width:100%;min-height:140px;padding:14px;background:#1e1e1e;border:1px solid #333;border-radius:8px;color:#e0e0e0;font-size:14px;line-height:1.6;resize:vertical;outline:none;font-family:inherit}
textarea:focus{border-color:#f5a623}
.charCount{text-align:right;font-size:12px;color:#555;margin-top:4px}
.preview{display:none;padding:16px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;margin-top:10px;font-size:14px;line-height:1.7;color:#ccc;white-space:pre-wrap}
.preview.visible{display:block}
.btnRow{display:flex;gap:10px;margin-top:20px}
.btnPublish{padding:12px 28px;background:#f5a623;color:#000;font-weight:700;font-size:15px;border:none;border-radius:8px;cursor:pointer}
.btnPublish:hover{background:#e09416}.btnPublish:disabled{background:#555;color:#888;cursor:not-allowed}
.btnClear{padding:12px 20px;background:transparent;border:1px solid #444;border-radius:8px;color:#aaa;font-size:14px;cursor:pointer}
.btnClear:hover{border-color:#e74c3c;color:#e74c3c}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:#1b4d2e;border:1px solid #27ae60;color:#2ecc71}
.toast.error{background:#4d1b1b;border:1px solid #c0392b;color:#e74c3c}
.histItem{padding:14px 16px;border:1px solid #222;border-radius:8px;margin-bottom:10px;background:#1a1a1a}
.histMeta{font-size:12px;color:#666;margin-bottom:6px;display:flex;gap:10px}
.histMeta span{color:#888}
.histText{font-size:13px;color:#ccc;line-height:1.6;white-space:pre-wrap}
.histEmpty{color:#555;font-size:14px;text-align:center;padding:24px 0}
.tokenNote{font-size:11px;color:#555;margin-top:4px;text-align:left}
</style>
</head>
<body>
<div id="loginScreen">
  <div class="loginBox">
    <div class="logo"><span>CV</span> Finanzas</div>
    <p>Panel de administración</p>
    <input type="password" id="pwInput" placeholder="Contraseña de acceso">
    <input type="password" id="tokenInput" placeholder="GitHub Token" autocomplete="off">
    <p class="tokenNote">El token se guarda en esta sesión solamente</p>
    <button onclick="doLogin()">Ingresar</button>
    <div id="loginError">Credenciales incorrectas</div>
  </div>
</div>
<div id="adminPanel">
  <div class="topBar">
    <div class="logo"><span>CV</span> Finanzas · Admin</div>
    <div class="right">
      <div class="statusDot">Conectado</div>
      <button class="btnLogout" onclick="doLogout()">Cerrar sesión</button>
    </div>
  </div>
  <div class="content">
    <div class="card">
      <h2>✏️ Análisis del día</h2>
      <div class="formRow">
        <div class="formGroup"><label>Fecha</label><input type="date" id="fechaInput"></div>
        <div class="formGroup"><label>Hora</label><input type="time" id="horaInput"></div>
      </div>
      <div class="formGroup">
        <label>Texto del análisis</label>
        <div class="emojiBar">
          <button class="emojiBtn" onclick="ins('📈')">📈 Sube</button>
          <button class="emojiBtn" onclick="ins('📉')">📉 Baja</button>
          <button class="emojiBtn" onclick="ins('⚠️')">⚠️ Alerta</button>
          <button class="emojiBtn" onclick="ins('✅')">✅ OK</button>
          <button class="previewBtn" id="prevBtn" onclick="togglePreview()">👁 Vista previa</button>
        </div>
        <textarea id="textoInput" placeholder="Escribí el análisis aquí..."></textarea>
        <div class="charCount"><span id="charCount">0</span> caracteres</div>
        <div class="preview" id="previewBox"></div>
      </div>
      <div class="btnRow">
        <button class="btnPublish" id="btnPublish" onclick="publicar()">🚀 Publicar</button>
        <button class="btnClear" onclick="limpiar()">Limpiar</button>
      </div>
    </div>
    <div class="card">
      <h2>📋 Historial</h2>
      <div id="historialBox"><div class="histEmpty">Cargando...</div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const PASS='cvfinanzas2026',REPO='CV7777/cvfinanzas-scraper',FILE='analisis.json';
let TOKEN='';
function $(i){return document.getElementById(i);}
function doLogin(){
  const pw=$('pwInput').value,tk=$('tokenInput').value.trim();
  if(pw===PASS&&tk.length>10){
    TOKEN=tk;sessionStorage.setItem('cvadmin','1');sessionStorage.setItem('cvtk',tk);
    $('loginScreen').style.display='none';$('adminPanel').style.display='block';init();
  }else{$('loginError').style.display='block';}
}
function doLogout(){sessionStorage.clear();location.reload();}
$('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')$('tokenInput').focus();});
$('tokenInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
if(sessionStorage.getItem('cvadmin')==='1'&&sessionStorage.getItem('cvtk')){
  TOKEN=sessionStorage.getItem('cvtk');
  $('loginScreen').style.display='none';$('adminPanel').style.display='block';init();
}
function init(){
  const n=new Date();
  $('fechaInput').value=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
  $('horaInput').value=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  $('textoInput').addEventListener('input',cnt);
  hist();
}
function ins(e){const ta=$('textoInput');const s=ta.selectionStart,en=ta.selectionEnd;ta.value=ta.value.substring(0,s)+e+' '+ta.value.substring(en);ta.selectionStart=ta.selectionEnd=s+e.length+1;ta.focus();cnt();if($('previewBox').classList.contains('visible'))prev();}
function cnt(){$('charCount').textContent=$('textoInput').value.length;if($('previewBox').classList.contains('visible'))prev();}
function togglePreview(){$('previewBox').classList.toggle('visible');$('prevBtn').classList.toggle('active');if($('previewBox').classList.contains('visible'))prev();}
function prev(){$('previewBox').textContent=$('textoInput').value;}
function limpiar(){$('textoInput').value='';$('charCount').textContent='0';$('previewBox').textContent='';}
async function publicar(){
  const fe=$('fechaInput').value,ho=$('horaInput').value,tx=$('textoInput').value.trim();
  if(!fe)return toast('Seleccioná una fecha','error');
  if(!ho)return toast('Indicá la hora','error');
  if(!tx)return toast('El análisis no puede estar vacío','error');
  const btn=$('btnPublish');btn.disabled=true;btn.textContent='⏳ Publicando...';
  try{
    const gr=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+FILE,{headers:{'Authorization':'Bearer '+TOKEN,'Accept':'application/vnd.github+json'}});
    if(!gr.ok)throw new Error('Error al leer archivo ('+gr.status+')');
    const fd=await gr.json();
    let ad;try{ad=JSON.parse(atob(fd.content.replace(/\n/g,'')));}catch(e){ad={analisis:[]};}
    if(!ad.analisis)ad.analisis=[];
    const pp=ho.split(':'),h=parseInt(pp[0]),am=h>=12?'PM':'AM',h12=String(h%12||12).padStart(2,'0'),hd=h12+':'+pp[1]+' '+am;
    ad.analisis.unshift({fecha:fe,texto:tx,hora:hd});
    if(ad.analisis.length>30)ad.analisis=ad.analisis.slice(0,30);
    const nc=btoa(unescape(encodeURIComponent(JSON.stringify(ad,null,2))));
    const pr=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+FILE,{method:'PUT',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json','Accept':'application/vnd.github+json'},body:JSON.stringify({message:'Analisis '+fe,content:nc,sha:fd.sha})});
    if(!pr.ok){const er=await pr.json();throw new Error(er.message||'Error al publicar ('+pr.status+')');}
    toast('✅ Análisis publicado correctamente','success');limpiar();setTimeout(hist,2500);
  }catch(err){toast('❌ '+err.message,'error');console.error(err);}
  finally{btn.disabled=false;btn.innerHTML='🚀 Publicar';}
}
async function hist(){
  const box=$('historialBox');box.innerHTML='<div class="histEmpty">Cargando...</div>';
  try{
    const r=await fetch('https://raw.githubusercontent.com/'+REPO+'/main/'+FILE+'?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();const li=d.analisis||[];
    if(!li.length){box.innerHTML='<div class="histEmpty">Sin análisis publicados aún</div>';return;}
    const ms=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    box.innerHTML=li.slice(0,10).map(x=>{
      const p=(x.fecha||'').split('-'),fs=p.length===3?parseInt(p[2])+' '+ms[parseInt(p[1])]+' '+p[0]:x.fecha||'';
      const tx=String(x.texto||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return '<div class="histItem"><div class="histMeta"><span>📅 '+fs+'</span><span>🕐 '+(x.hora||'')+'</span></div><div class="histText">'+tx+'</div></div>';
    }).join('');
  }catch(e){box.innerHTML='<div class="histEmpty" style="color:#e74c3c">Error al cargar: '+e.message+'</div>';}
}
function toast(m,t){const el=$('toast');el.textContent=m;el.className='toast '+(t||'success')+' show';setTimeout(()=>el.classList.remove('show'),3500);}
</script>
</body>
</html>
